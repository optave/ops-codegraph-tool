name: Build Native

on:
  pull_request:
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
  workflow_dispatch:

permissions: {}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            node_arch: x64
            node_os: linux
          - os: macos-latest
            target: aarch64-apple-darwin
            node_arch: arm64
            node_os: darwin
          - os: macos-14
            target: x86_64-apple-darwin
            node_arch: x64
            node_os: darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            node_arch: x64
            node_os: win32

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.target }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/codegraph-core

      - name: Install napi-rs CLI
        run: npm install -g @napi-rs/cli@3

      - name: Build native addon
        working-directory: crates/codegraph-core
        run: napi build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: native-${{ matrix.node_os }}-${{ matrix.node_arch }}
          path: crates/codegraph-core/*.node
          if-no-files-found: error
